<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1d4ed8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>POS</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script type="module" src="config.js"></script>
<link rel="stylesheet" href="pos.css">
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <img src="icon-192.png" style="width: 200%;"/>
      </div>
    </div>
    <div class="login-title">POS</div>
    <p class="login-sub">Ingresá tus credenciales para continuar</p>

    <div class="login-field">
      <label for="loginUser">Usuario</label>
      <input type="text" id="loginUser" placeholder="Usuario" autocomplete="username" autocapitalize="none">
    </div>

    <div class="login-field">
      <label for="loginPass">Contraseña</label>
      <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password">
    </div>

    <div class="login-error" id="loginError"></div>

    <button class="login-btn" onclick="doLogin()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Ingresar
    </button>
  </div>
</div>

<!-- ===== POS APP ===== -->
<div id="posApp" style="display:none;flex-direction:column;height:100%;">

<!-- Payment loader -->
<div class="pay-loader hidden" id="payLoader">
  <div class="spinner"></div>
  <p>Procesando pago...</p>
</div>

<!-- Toasts -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- Header -->
<header class="header">
  <button class="logout-btn" onclick="doLogout()" title="Cerrar sesión">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
  </button>

  <button class="report-btn" onclick="openReport()" title="Reporte de ventas">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      <path d="M2 20h20"/>
    </svg>
  </button>
  <button class="report-btn" onclick="recargarProductos(true)" title="Recargar productos">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
      <path d="M21 3v5h-5"/>
    </svg>
  </button>
  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="search" placeholder="Buscar producto..." oninput="handleSearch()" autocomplete="off">
    <button class="icon-btn" id="search-clear" onclick="clearSearch()" style="background:none;border:none;width:30px;height:30px;border-radius:6px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>

  <div class="total-box">
    <span class="total-label">Total</span>
    <div class="total-amount" id="totalAmount">$0</div>
  </div>
</header>

<!-- Category filter bar -->
<div class="cat-filter-bar" id="catFilterBar">
  <button class="cat-chip active" data-cat="todos" onclick="setCatFilter('todos', this)">Todos</button>
  <button class="cat-chip" data-cat="bebidas_calientes" onclick="setCatFilter('bebidas_calientes', this)">
    <span class="chip-dot" style="background:#f97316"></span>☕ Bebidas calientes
  </button>
  <button class="cat-chip" data-cat="bebidas_frias" onclick="setCatFilter('bebidas_frias', this)">
    <span class="chip-dot" style="background:#06b6d4"></span>🍹 Bebidas frías
  </button>
  <button class="cat-chip" data-cat="dulces" onclick="setCatFilter('dulces', this)">
    <span class="chip-dot" style="background:#ec4899"></span>🍰 Dulces
  </button>
  <button class="cat-chip" data-cat="postres" onclick="setCatFilter('postres', this)">
    <span class="chip-dot" style="background:#8b5cf6"></span>🍮 Postres
  </button>
  <button class="cat-chip" data-cat="salados" onclick="setCatFilter('salados', this)">
    <span class="chip-dot" style="background:#84cc16"></span>🥪 Salados
  </button>
  <button class="cat-chip" data-cat="tortas" onclick="setCatFilter('tortas', this)">
    <span class="chip-dot" style="background:#f59e0b"></span>🎂 Tortas
  </button>
  <button class="cat-chip" data-cat="meriendas" onclick="setCatFilter('meriendas', this)">
    <span class="chip-dot" style="background:#10b981"></span>🥐 Meriendas
  </button>
</div>

<!-- Product grid -->
<main class="main">
  <div id="stateCenter" class="state-center">
    <div class="spinner"></div>
  </div>
  <div class="grid" id="grid"></div>
</main>

<!-- FAB -->
<button class="fab hidden" id="fab" onclick="openDrawer()">
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
  Ver Carrito
  <span class="fab-badge" id="fabBadge">0</span>
</button>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<!-- Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <span class="drawer-title">Carrito</span>
    <button class="icon-btn" onclick="closeDrawer()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>

  <div class="drawer-items" id="drawerItems">
    <div class="empty-cart">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
      <p>El carrito está vacío</p>
    </div>
  </div>

  <div class="drawer-footer">
    <div class="discount-row">
      <input type="number" id="discount" placeholder="Desc. %" min="0" max="100" oninput="updateDrawerTotal()">
      <input type="text" id="discountDesc" placeholder="Motivo del descuento">
    </div>

    <div class="totals" id="totalsBox">
      <div class="totals-row" id="subtotalRow">
        <span>Subtotal</span>
        <span id="subtotalVal">$0</span>
      </div>
      <div class="totals-row discount" id="discountRow" style="display:none">
        <span id="discountLabel">Descuento (0%)</span>
        <span id="discountVal">-$0</span>
      </div>
      <div class="totals-row total-final">
        <span>Total</span>
        <span id="cartTotal">$0</span>
      </div>
    </div>

    <div class="pay-row">
      <button class="pay-btn cash"   onclick="abrirCambio('efectivo')" id="btnEfectivo" disabled>Efectivo</button>
      <button class="pay-btn debit"  onclick="pagar('debito')"   id="btnDebito"   disabled>Débito</button>
      <button class="pay-btn credit" onclick="pagar('credito')"  id="btnCredito"  disabled>Crédito</button>
    </div>

    <button class="clear-btn" id="clearBtn" onclick="clearCart()" disabled>Vaciar carrito</button>
  </div>
</div>

<!-- ===== CALCULADORA DE VUELTO ===== -->
<div class="cambio-modal-overlay" id="cambioModalOverlay" onclick="handleCambioOverlayClick(event)">
  <div class="cambio-modal">
    <div class="cambio-modal-head">
      <span class="cambio-modal-title">Pago en efectivo</span>
      <button class="icon-btn" onclick="cerrarCambio()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="cambio-modal-body">
      <div>
        <div class="cambio-total-label">Total a cobrar</div>
        <div class="cambio-total-val" id="cambioTotalVal">$0</div>
      </div>

      <div class="cambio-field">
        <label for="cambioMonto">Monto recibido</label>
        <input type="number" id="cambioMonto" placeholder="0" min="0" oninput="calcularCambio()" inputmode="numeric">
      </div>

      <div class="cambio-quick-btns" id="cambioQuickBtns"></div>

      <div class="cambio-result">
        <span class="cambio-result-label">Vuelto</span>
        <span class="cambio-result-val" id="cambioResultVal">—</span>
      </div>
    </div>
    <div class="cambio-modal-footer">
      <button class="cambio-cancel-btn" onclick="cerrarCambio()">Cancelar</button>
      <button class="cambio-confirm-btn" id="cambioPagarBtn" onclick="confirmarPagoEfectivo()" disabled>Confirmar pago</button>
    </div>
  </div>
</div>

<!-- ===== REPORT PANEL ===== -->
<div class="report-panel" id="reportPanel">
  <div class="report-header">
    <div class="report-header-row1">
      <button class="icon-btn" onclick="closeReport()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="report-header-titles">
        <div class="report-header-title">Reporte de Ventas</div>
        <div class="report-header-sub" id="reportSubtitle">Cargando datos...</div>
      </div>
    </div>
    <div class="report-header-row2">
      <button class="add-product-btn" onclick="openProductModal(null)" title="Agregar producto a la carta">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        Producto
      </button>
      <button class="backup-btn" id="backupBtn" onclick="generarRespaldo()" title="Generar respaldo en Google Drive">
        <svg class="icon-backup" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <svg class="icon-spin" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        Respaldo
      </button>
      <button class="backup-btn" onclick="cargarVentas(true)" title="Cargar ventas">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
          <path d="M21 3v5h-5"></path>
        </svg>
      </button>
    </div>
  </div>

  <div class="report-body" id="reportBody">
    <div class="filter-card">
      <h3>Filtrar por fecha</h3>
      <div class="filter-row">
        <div class="filter-group">
          <label for="fechaDesde">Desde</label>
          <input type="date" id="fechaDesde">
        </div>
        <div class="filter-group">
          <label for="fechaHasta">Hasta</label>
          <input type="date" id="fechaHasta">
        </div>
        <button class="filter-apply-btn" onclick="aplicarFiltro()">Aplicar</button>
      </div>
      <div class="quick-filters">
        <button class="qf-btn" onclick="setQuickFilter('hoy', this)">Hoy</button>
        <button class="qf-btn" onclick="setQuickFilter('semana', this)">Esta semana</button>
        <button class="qf-btn" onclick="setQuickFilter('mes', this)">Este mes</button>
        <button class="qf-btn" onclick="setQuickFilter('todo', this)">Todo</button>
      </div>
    </div>

    <div id="reportContent">
      <div class="report-loading">
        <div class="spinner"></div>
        <span>Cargando ventas...</span>
      </div>
    </div>
  </div>
</div>

<!-- ===== ADD / EDIT PRODUCT MODAL ===== -->
<div class="modal-overlay" id="productModalOverlay" onclick="handleModalOverlayClick(event)">
  <div class="modal" id="productModal">
    <div class="modal-head">
      <span class="modal-title" id="productModalTitle">Agregar Producto</span>
      <button class="icon-btn" onclick="closeProductModal()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <div class="modal-body">
      <input type="hidden" id="prodId">

      <div class="form-group">
        <label for="prodNombre">Nombre *</label>
        <input type="text" id="prodNombre" placeholder="Ej: Café con leche" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="prodDescripcion">Descripción</label>
        <textarea id="prodDescripcion" placeholder="Descripción opcional del producto..."></textarea>
      </div>

      <div class="form-group">
        <label for="prodPrecio">Precio *</label>
        <input type="number" id="prodPrecio" placeholder="0" min="0" step="1">
      </div>

      <div class="form-group">
        <label>Categoría *</label>
        <div class="category-grid">
          <label>
            <input type="radio" name="prodCategoria" class="cat-option" value="bebidas_calientes" id="catBC">
            <span class="cat-label"><span class="cat-dot" style="background:#f97316"></span>Bebidas calientes</span>
          </label>
          <label>
            <input type="radio" name="prodCategoria" class="cat-option" value="bebidas_frias" id="catBF">
            <span class="cat-label"><span class="cat-dot" style="background:#06b6d4"></span>Bebidas frías</span>
          </label>
          <label>
            <input type="radio" name="prodCategoria" class="cat-option" value="dulces" id="catDu">
            <span class="cat-label"><span class="cat-dot" style="background:#ec4899"></span>Dulces</span>
          </label>
          <label>
            <input type="radio" name="prodCategoria" class="cat-option" value="postres" id="catPo">
            <span class="cat-label"><span class="cat-dot" style="background:#8b5cf6"></span>Postres</span>
          </label>
          <label>
            <input type="radio" name="prodCategoria" class="cat-option" value="salados" id="catSa">
            <span class="cat-label"><span class="cat-dot" style="background:#84cc16"></span>Salados</span>
          </label>
          <label>
            <input type="radio" name="prodCategoria" class="cat-option" value="tortas" id="catTo">
            <span class="cat-label"><span class="cat-dot" style="background:#f59e0b"></span>Tortas</span>
          </label>
          <label>
            <input type="radio" name="prodCategoria" class="cat-option" value="meriendas" id="catMe">
            <span class="cat-label"><span class="cat-dot" style="background:#10b981"></span>Meriendas</span>
          </label>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="modal-delete-btn" id="deleteProductBtn" onclick="eliminarProducto()" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
      </button>
      <button class="modal-cancel-btn" onclick="closeProductModal()">Cancelar</button>
      <button class="modal-save-btn" id="saveProductBtn" onclick="guardarProducto()">
        <svg class="icon-spin-save" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        <span class="save-label">Guardar</span>
      </button>
    </div>
  </div>
</div>

</div><!-- end #posApp -->

<script>
const API = getAPI("desa");//"https://script.google.com/macros/s/AKfycbyLNPKzt0ROtLnBE5ICTZS9hGfFmpc5GEEFmw3W5qhNMMt_gK5GoqdwAYL23MmzicZxdw/exec"; 
//"https://script.google.com/macros/s/AKfycbwAH4HnXfbQ8Dw-ZEoNarZldMcdJVmPltaoiRiRPpU1VdvWH3AgBP3OvinYvgiPLKu_OQ/exec";
//"https://script.google.com/macros/s/AKfycbz9usIdlccGectH2t_PMAGgvyIlN85b6sDNjJoSr0DV-vzimC27dv3ekFkQP9yeIS_n4Q/exec";
//"https://script.google.com/macros/s/AKfycbxVKMANEYgbA3WuyjkXNi_0qMozoM3CewEWFbcQmmobYQZl6Gj2dFwAsKLIZj6GTG4ZdQ/exec";
//"https://script.google.com/macros/s/AKfycby0VKc3b82dGGrW0BV7Rc0eREA4rNIYEcjHNc0ROMiD8vAdqofv_RE6lmMQU_w0xpg_Vg/exec";
//"https://script.google.com/macros/s/AKfycbyE1ks-BhRSMEDyJyKhJ0NRuc73Z9i0C_b1pK3IlD3FEaNrbiZ299eAgAo9tyf6dnMVzQ/exec";
//"https://script.google.com/macros/s/AKfycbwZinHlc8-t5kFEn--QCb4WHIby99RyMyz1aFyy0CYSnltLriQvl9Ba0J5LQ2kUtrw_ng/exec";//API_DES;//"https://script.google.com/macros/s/AKfycbx-RaN4Lz01l5BBG4HYuX1ojuJDmaVcUFFc9XG74hdhL8GykYawG-qVfZ5owP4CKlzk/exec";
            //"https://script.google.com/macros/s/AKfycbxJHNsxRaFanBNNH802Ho27HauR_njyWLge_eV4RYZVzC0nNPpgVY7X0hoADMc4LISa/exec";
            //"https://script.google.com/macros/s/AKfycbxOTqH5t1J3Kfsc7EwVtTfSJiYFt_Fhj_RXWKVJCo9Dg7laloh5kTJqgqPIE4Bj09DG/exec";
const POSTOKEN = localStorage.getItem("user") + "_" + localStorage.getItem("pass");

/* ========== AUTH ========== */
function checkSession() {
  return localStorage.getItem("session") === "active"
        && ((localStorage.getItem("user") != null && localStorage.getItem("user") != "")
        && (localStorage.getItem("pass") != null && localStorage.getItem("pass") != ""));
}

function doLogin() {
  const userInput = document.getElementById("loginUser").value.trim();
  const passInput = document.getElementById("loginPass").value;
  const errorEl = document.getElementById("loginError");

  errorEl.textContent = "";

  if (!userInput) {
    document.getElementById("loginUser").classList.add("invalid");
    errorEl.textContent = "Ingresá el usuario.";
    return;
  }

  if (!passInput) {
    document.getElementById("loginPass").classList.add("invalid");
    errorEl.textContent = "Ingresá la contraseña.";
    return;
  }

  localStorage.setItem("user", userInput);
  localStorage.setItem("pass", passInput);
  localStorage.setItem("session", "active");
  showPOS();
  loadCart();
  cargarProductos();
}

function doLogout() {
  if (!confirm("¿Cerrar sesión?")) return;
  localStorage.removeItem("session");
  localStorage.removeItem("user");
  localStorage.removeItem("pass");
  showLogin();
}

function showLogin() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("posApp").style.display = "none";
  document.getElementById("loginUser").value = "";
  document.getElementById("loginPass").value = "";
  document.getElementById("loginError").textContent = "";
}

function showPOS() {
  document.getElementById("loginScreen").style.display = "none";
  const posApp = document.getElementById("posApp");
  posApp.style.display = "flex";
  posApp.style.flexDirection = "column";
  posApp.style.height = "100%";
}

/* ========== CATEGORY EMOJI ========== */
const CATEGORY_EMOJI = {
  bebidas_calientes: "☕",
  bebidas_frias:     "🍹",
  dulces:            "🍰",
  postres:           "🍮",
  salados:           "🥪",
  tortas:            "🎂",
  meriendas:         "🥐"
};

function getCategoryEmoji(categoria) {
  return CATEGORY_EMOJI[categoria] || "";
}

/* ========== UTILS ========== */
function fmt(n) {
  return "$" + Math.round(n).toLocaleString("es-UY");
}

function showToast(msg, type = "success") {
  const wrap = document.getElementById("toastWrap");
  const t = document.createElement("div");
  t.className = "toast " + type;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* ========== FILTRO DE CATEGORÍA ========== */
let activeCatFilter = "todos";

function setCatFilter(cat, btn) {
  activeCatFilter = cat;
  document.querySelectorAll(".cat-chip").forEach(c => c.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

function applyFilters() {
  const searchTxt = normalizarTexto(document.getElementById("search").value);
  let lista = productos;

  if (activeCatFilter !== "todos") {
    lista = lista.filter(p => p.categoria === activeCatFilter);
  }

  if (searchTxt) {
    lista = lista.filter(p => normalizarTexto(p.nombre).includes(searchTxt));
  }

  renderProductos(lista);
}

/* ========== PRODUCTOS ========== */
let productos = [];
let carrito = [];
let drawerOpen = false;
let currentDiscount = 0;

async function cargarProductos(force = false) {
  const cache = localStorage.getItem("productos");
  const localTs = localStorage.getItem("productos_timestamp");

  if (cache && !force) {
    productos = JSON.parse(cache);
    renderProductos();
  }

  try {
    const tsData = await fetch(API + "?action=timestamp").then(r => r.json());
    const serverTs = String(tsData.timestamp);

    if (!localTs || localTs !== serverTs || productos.length == 0 || force) {
      const data = await fetch(API + "?action=productos").then(r => r.json());
      productos = data.sort((a, b) =>
        a.nombre.trim().localeCompare(b.nombre.trim(), "es", { sensitivity: "base" })
      );
      applyFilters();
      localStorage.setItem("productos", JSON.stringify(productos));
      localStorage.setItem("productos_timestamp", serverTs);
    }
  } catch {
    if (!cache) {
      document.getElementById("stateCenter").innerHTML =
        '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg><p style="font-size:15px">Sin conexión. Sin productos en caché.</p>';
    }
  }
}

function renderProductos(lista = productos) {
  const stateEl = document.getElementById("stateCenter");
  const grid = document.getElementById("grid");

  if (lista.length === 0 && productos.length > 0) {
    stateEl.style.display = "flex";
    stateEl.innerHTML =
      '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><p>No se encontraron productos</p>';
    grid.innerHTML = "";
    return;
  }

  if (lista.length > 0) stateEl.style.display = "none";

  grid.innerHTML = "";
  lista.forEach(p => {
    const qty = (carrito.find(i => i.id === p.id) || {}).cantidad || 0;
    const div = document.createElement("div");
    div.className = "card" + (qty > 0 ? " in-cart" : "");
    const emoji = getCategoryEmoji(p.categoria);

    div.innerHTML = `
      ${emoji ? `<div class="card-emoji">${emoji}</div>` : ""}
      ${qty > 0 ? `<div class="card-qty">${qty}</div>` : ""}
      <div class="card-lp-ring">
        <svg width="52" height="52" viewBox="0 0 30 30">
          <circle cx="15" cy="15" r="14"/>
        </svg>
      </div>
      <div class="card-name">${capitalizarTexto(p.nombre)}</div>
      <div class="card-bottom">
        <span class="card-price">${fmt(p.precio)}</span>
        <div class="card-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        </div>
      </div>
    `;

    // ── Long press para editar ──────────────────────────
    let lpTimer = null;
    let didLongPress = false;

    const startLongPress = () => {
      didLongPress = false;
      div.classList.add("long-pressing");
      const ring = div.querySelector(".card-lp-ring circle");
      if (ring) { ring.style.animation = "none"; void ring.offsetWidth; ring.style.animation = ""; }
      lpTimer = setTimeout(() => {
        didLongPress = true;
        div.classList.remove("long-pressing");
        navigator.vibrate?.(50);
        openProductModal(p);
      }, 580);
    };

    const cancelLongPress = () => {
      clearTimeout(lpTimer);
      div.classList.remove("long-pressing");
    };

    // Touch (mobile)
    div.addEventListener("touchstart",  () => startLongPress(), { passive: true });
    div.addEventListener("touchend",    cancelLongPress);
    div.addEventListener("touchmove",   cancelLongPress);
    div.addEventListener("touchcancel", cancelLongPress);

    // Mouse (desktop): mantener presionado o click derecho
    div.addEventListener("mousedown", (e) => {
      if (e.button === 0) startLongPress(); // botón izquierdo sostenido
    });
    div.addEventListener("mouseup",    cancelLongPress);
    div.addEventListener("mouseleave", cancelLongPress);

    // Click derecho → editar directamente (desktop)
    div.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      cancelLongPress();
      openProductModal(p);
    });

    // Click izquierdo normal → agregar al carrito
    div.addEventListener("click", (e) => {
      if (didLongPress) { didLongPress = false; return; }
      addToCart(p);
    });

    grid.appendChild(div);
  });
}

/* ========== CARRITO ========== */
function addToCart(prod) {
  const item = carrito.find(i => i.id === prod.id);
  if (item) item.cantidad++;
  else carrito.push({ id: prod.id, nombre: prod.nombre, precio: prod.precio, cantidad: 1 });

  saveCart();
  updateTotal();
  applyFilters();

  if (drawerOpen) renderCartItems();
}

function changeQty(id, delta) {
  const idx = carrito.findIndex(i => i.id === id);
  if (idx === -1) return;
  carrito[idx].cantidad += delta;
  if (carrito[idx].cantidad <= 0) carrito.splice(idx, 1);
  saveCart();
  updateTotal();
  applyFilters();
  renderCartItems();
}

function removeFromCart(id) {
  carrito = carrito.filter(i => i.id !== id);
  saveCart();
  updateTotal();
  applyFilters();
  renderCartItems();
}

function clearCart() {
  if (!confirm("¿Vaciar todo el carrito?")) return;
  carrito = [];
  document.getElementById("discount").value = "";
  document.getElementById("discountDesc").value = "";
  currentDiscount = 0;
  saveCart();
  updateTotal();
  applyFilters();
  renderCartItems();
  navigator.vibrate?.(30);
}

function saveCart() {
  if (carrito.length > 0) localStorage.setItem("carrito", JSON.stringify(carrito));
  else localStorage.removeItem("carrito");
}

function loadCart() {
  const d = localStorage.getItem("carrito");
  if (d) { try { carrito = JSON.parse(d); } catch {} }
  updateTotal();
}

/* ========== TOTAL HEADER ========== */
function updateTotal() {
  const subtotal = carrito.reduce((s, i) => s + i.precio * i.cantidad, 0);
  const discPct = parseFloat(document.getElementById("discount")?.value) || 0;
  currentDiscount = subtotal * Math.min(discPct, 100) / 100;
  const total = subtotal - currentDiscount;

  const el = document.getElementById("totalAmount");
  if (!el) return;
  el.textContent = fmt(total);
  el.classList.toggle("active", total > 0);
  el.classList.remove("bump");
  void el.offsetWidth;
  el.classList.add("bump");

  const totalItems = carrito.reduce((s, i) => s + i.cantidad, 0);
  const fab = document.getElementById("fab");
  document.getElementById("fabBadge").textContent = totalItems;
  fab.classList.toggle("hidden", totalItems === 0);

  updatePayButtons();
  updateDrawerTotal();
}

function updateDrawerTotal() {
  const subtotalEl = document.getElementById("subtotalVal");
  if (!subtotalEl) return;

  const subtotal = carrito.reduce((s, i) => s + i.precio * i.cantidad, 0);
  const discPct = parseFloat(document.getElementById("discount")?.value) || 0;
  const clampedPct = Math.min(Math.max(discPct, 0), 100);
  currentDiscount = subtotal * clampedPct / 100;
  const total = subtotal - currentDiscount;

  subtotalEl.textContent = fmt(subtotal);
  document.getElementById("cartTotal").textContent = fmt(total);

  const discRow = document.getElementById("discountRow");
  if (currentDiscount > 0) {
    discRow.style.display = "flex";
    document.getElementById("discountLabel").textContent = `Descuento (${clampedPct}%)`;
    document.getElementById("discountVal").textContent = "-" + fmt(currentDiscount);
  } else {
    discRow.style.display = "none";
  }

  const totalEl = document.getElementById("totalAmount");
  if (totalEl) {
    totalEl.textContent = fmt(total);
    totalEl.classList.toggle("active", total > 0);
  }
}

function updatePayButtons() {
  const disabled = carrito.length === 0;
  ["btnEfectivo", "btnDebito", "btnCredito", "clearBtn"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = disabled;
  });
}

/* ========== CALCULADORA DE VUELTO ========== */
let cambioMetodo = "efectivo";

function calcularTotalActual() {
  const subtotal = carrito.reduce((s, i) => s + i.precio * i.cantidad, 0);
  return subtotal - currentDiscount;
}

function abrirCambio(metodo) {
  if (carrito.length === 0) return;
  cambioMetodo = metodo;

  const total = calcularTotalActual();
  document.getElementById("cambioTotalVal").textContent = fmt(total);
  document.getElementById("cambioMonto").value = "";
  document.getElementById("cambioResultVal").textContent = "—";
  document.getElementById("cambioResultVal").className = "cambio-result-val";
  document.getElementById("cambioPagarBtn").disabled = true;

  // Quick amount buttons: redondeos útiles
  const quickBtns = document.getElementById("cambioQuickBtns");
  const redondeos = generarRedondeos(total);
  quickBtns.innerHTML = redondeos.map(v =>
    `<button class="cambio-quick-btn" onclick="setMontoRapido(${v})">${fmt(v)}</button>`
  ).join("");

  document.getElementById("cambioModalOverlay").classList.add("open");
  setTimeout(() => document.getElementById("cambioMonto").focus(), 200);
}

function generarRedondeos(total) {
  const redondeos = [];
  const bases = [100, 200, 500, 1000, 2000, 5000, 10000];
  for (const b of bases) {
    const r = Math.ceil(total / b) * b;
    if (!redondeos.includes(r) && redondeos.length < 6) redondeos.push(r);
  }
  return redondeos.slice(0, 6);
}

function setMontoRapido(val) {
  document.getElementById("cambioMonto").value = val;
  calcularCambio();
}

function calcularCambio() {
  const total = calcularTotalActual();
  const monto = parseFloat(document.getElementById("cambioMonto").value) || 0;
  const vuelto = monto - total;
  const resultEl = document.getElementById("cambioResultVal");
  const pagarBtn = document.getElementById("cambioPagarBtn");

  if (!monto) {
    resultEl.textContent = "—";
    resultEl.className = "cambio-result-val";
    pagarBtn.disabled = true;
    return;
  }

  if (vuelto < 0) {
    resultEl.textContent = fmt(vuelto);
    resultEl.className = "cambio-result-val negativo";
    pagarBtn.disabled = true;
  } else {
    resultEl.textContent = fmt(vuelto);
    resultEl.className = "cambio-result-val";
    pagarBtn.disabled = false;
  }
}

function cerrarCambio() {
  document.getElementById("cambioModalOverlay").classList.remove("open");
}

function handleCambioOverlayClick(e) {
  if (e.target === document.getElementById("cambioModalOverlay")) cerrarCambio();
}

function confirmarPagoEfectivo() {
  cerrarCambio();
  pagar(cambioMetodo);
}

/* ========== PAGO ========== */
async function pagar(metodo) {
  if (carrito.length === 0) return;

  const desc = document.getElementById("discountDesc").value || "Sin descripción";
  const items = carrito.map(i => ({
    nombre: i.nombre,
    cantidad: i.cantidad,
    precio: i.precio,
    total: i.precio * i.cantidad,
    id: i.id
  }));

  if (currentDiscount > 0) {
    items.push({
      id: "descuento",
      nombre: "Descuento - " + desc,
      cantidad: 1,
      precio: -currentDiscount,
      total: -currentDiscount
    });
  }

  const venta = { metodo, items };

  showPayLoader(true);
  setPayBtnsDisabled(true);

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "data=" + encodeURIComponent(JSON.stringify({
        action: "venta",
        token: POSTOKEN,
        ...venta
      }))
    });
    const json = await res.json();

    if (json.error) {
      throw new Error(json.error);
    }

    carrito = [];
    document.getElementById("discount").value = "";
    document.getElementById("discountDesc").value = "";
    currentDiscount = 0;
    localStorage.removeItem("carrito");
    saveCart();
    updateTotal();
    applyFilters();
    closeDrawer();
    showToast("Pago procesado (" + metodo + ")", "success");
  } catch {
    showToast("Error al procesar el pago. Intente nuevamente.", "error");
  } finally {
    showPayLoader(false);
    setPayBtnsDisabled(false);
  }
}

function showPayLoader(show) {
  document.getElementById("payLoader").classList.toggle("hidden", !show);
}

function setPayBtnsDisabled(v) {
  ["btnEfectivo", "btnDebito", "btnCredito"].forEach(id => {
    document.getElementById(id).disabled = v;
  });
}

/* ========== REPORTE ========== */
let ventasCache = [];
let reportChart = null;
let activeQuickFilter = null;

function openReport() {
  document.getElementById("reportPanel").classList.add("open");
  if (ventasCache.length === 0) {
    cargarVentas();
  }
}

function closeReport() {
  document.getElementById("reportPanel").classList.remove("open");
}

function toDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function setQuickFilter(tipo, btn) {
  document.querySelectorAll(".qf-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  activeQuickFilter = tipo;

  const hoy = new Date();
  let desde, hasta;

  if (tipo === "hoy") {
    desde = hasta = toDateStr(hoy);
  } else if (tipo === "semana") {
    const lunes = new Date(hoy);
    lunes.setDate(hoy.getDate() - hoy.getDay() + (hoy.getDay() === 0 ? -6 : 1));
    desde = toDateStr(lunes);
    hasta = toDateStr(hoy);
  } else if (tipo === "mes") {
    desde = toDateStr(new Date(hoy.getFullYear(), hoy.getMonth(), 1));
    hasta = toDateStr(hoy);
  } else {
    desde = "";
    hasta = "";
  }

  document.getElementById("fechaDesde").value = desde;
  document.getElementById("fechaHasta").value = hasta;
  renderReporte();
}

async function cargarVentas() {
  const content = document.getElementById("reportContent");
  content.innerHTML = `<div class="report-loading"><div class="spinner"></div><span>Cargando ventas...</span></div>`;
  document.getElementById("reportSubtitle").textContent = "Actualizando...";

  try {
    const data = await fetch(API + "?action=reporte").then(r => r.json());
    ventasCache = Array.isArray(data) ? data : [];
    renderReporte();
  } catch (e) {
    content.innerHTML = `
      <div class="report-empty">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
        <p>No se pudo cargar el reporte.<br>Verificá tu conexión e intentá nuevamente.</p>
      </div>`;
    document.getElementById("reportSubtitle").textContent = "Error al cargar";
  }
}

function aplicarFiltro() {
  document.querySelectorAll(".qf-btn").forEach(b => b.classList.remove("active"));
  activeQuickFilter = null;
  renderReporte();
}

function parseFecha(val) {
  if (!val) return null;
  if (val instanceof Date) return val;
  const s = String(val);
  const d = new Date(s);
  if (!isNaN(d)) return d;
  const parts = s.split(/[\/\-\.]/);
  if (parts.length === 3) {
    if (parts[0].length === 4) return new Date(parts[0], parts[1] - 1, parts[2]);
    return new Date(parts[2], parts[1] - 1, parts[0]);
  }
  return null;
}

function renderReporte() {
  const desde = document.getElementById("fechaDesde").value;
  const hasta = document.getElementById("fechaHasta").value;

  let ventas = ventasCache;

  if (desde || hasta) {
    ventas = ventas.filter(v => {
      const f = parseFecha(v.fecha);
      if (!f) return false;
      const fs = toDateStr(f);
      if (desde && fs < desde) return false;
      if (hasta && fs > hasta) return false;
      return true;
    });
  }

  const ventasProductos = ventas.filter(v => v.total >= 0 && !String(v.nombre).toLowerCase().startsWith("descuento"));

  const content = document.getElementById("reportContent");

  if (ventas.length === 0 && ventasCache.length > 0) {
    content.innerHTML = `
      <div class="report-empty">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <p>No hay ventas en el período seleccionado.</p>
      </div>`;
    updateSubtitle(ventas, desde, hasta);
    return;
  }

  if (ventasCache.length === 0) {
    content.innerHTML = `
      <div class="report-empty">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h2l.4 2"/><path d="M7 13h10l4-8H5.4"/><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
        <p>Sin datos de ventas aún.</p>
      </div>`;
    document.getElementById("reportSubtitle").textContent = "Sin ventas registradas";
    return;
  }

  const totalVentas = ventasProductos.reduce((s, v) => s + (parseFloat(v.total) || 0), 0);
  const totalItems = ventasProductos.reduce((s, v) => s + (parseInt(v.cantidad) || 0), 0);
  const efectivo = ventas.filter(v => String(v.metodo).toLowerCase() === "efectivo").reduce((s, v) => s + Math.max(parseFloat(v.total) || 0, 0), 0);
  const transacciones = new Set(ventas.map(v => v.fecha + "_" + v.metodo)).size;

  const prodMap = {};
  ventasProductos.forEach(v => {
    const n = v.nombre || "Desconocido";
    if (!prodMap[n]) prodMap[n] = { cantidad: 0, total: 0 };
    prodMap[n].cantidad += parseInt(v.cantidad) || 0;
    prodMap[n].total += parseFloat(v.total) || 0;
  });

  const topProductos = Object.entries(prodMap)
    .sort((a, b) => b[1].cantidad - a[1].cantidad)
    .slice(0, 10);

  updateSubtitle(ventas, desde, hasta);

  content.innerHTML = `
    <div class="summary-grid">
      <div class="summary-card green">
        <div class="summary-label">Total vendido</div>
        <div class="summary-value">${fmt(totalVentas)}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Unidades</div>
        <div class="summary-value">${totalItems.toLocaleString("es-UY")}</div>
      </div>
      <div class="summary-card blue">
        <div class="summary-label">Efectivo</div>
        <div class="summary-value">${fmt(efectivo)}</div>
      </div>
      <div class="summary-card purple">
        <div class="summary-label">Transacciones</div>
        <div class="summary-value">${transacciones}</div>
      </div>
    </div>

    <div class="chart-card">
      <h3>Productos más vendidos (por unidades)</h3>
      <div class="chart-wrap">
        <canvas id="reportChartCanvas"></canvas>
      </div>
    </div>

    <div class="table-card">
      <h3>Ventas agrupadas (${transacciones} transacciones)</h3>
      <div id="ventasGrupoContainer"></div>
    </div>
  `;

  renderChart(topProductos);
  renderVentasAgrupadas(ventas);
}

/* ========== VENTAS AGRUPADAS ========== */
function renderVentasAgrupadas(ventas) {
  const container = document.getElementById("ventasGrupoContainer");
  if (!container) return;

  if (ventas.length === 0) {
    container.innerHTML = `<div class="report-empty"><p>Sin registros.</p></div>`;
    return;
  }

  // Agrupar por clave fecha+metodo
  const grupos = {};
  ventas.forEach(v => {
    const fecha = parseFecha(v.fecha);
    const fechaStr = fecha ? fecha.toLocaleDateString("es-UY", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" }) : (v.fecha || "?");
    const clave = v.fecha + "___" + v.metodo;
    if (!grupos[clave]) {
      grupos[clave] = {
        fechaStr,
        fecha: v.fecha,
        metodo: v.metodo,
        items: [],
        total: 0
      };
    }
    grupos[clave].items.push(v);
    grupos[clave].total += parseFloat(v.total) || 0;
  });

  const gruposArr = Object.values(grupos).sort((a, b) => {
    const fa = parseFecha(a.fecha);
    const fb = parseFecha(b.fecha);
    return (fb || 0) - (fa || 0);
  });

  // Mostrar máximo 100 transacciones
  const visible = gruposArr.slice(0, 100);

  container.innerHTML = visible.map((g, idx) => {
    const metodo = String(g.metodo || "").toLowerCase();
    const badgeClass = metodo === "efectivo" ? "badge-efectivo" : metodo === "debito" ? "badge-debito" : metodo === "credito" ? "badge-credito" : "";
    const itemsHtml = g.items.map(v => {
      const esDescuento = String(v.nombre).toLowerCase().startsWith("descuento");
      return `<div class="venta-item-row${esDescuento ? " descuento" : ""}">
        <span class="venta-item-nombre">${v.nombre || "-"}</span>
        <span class="venta-item-cant">x${v.cantidad || 1}</span>
        <span class="venta-item-total">${v.total != null ? fmt(parseFloat(v.total)) : "-"}</span>
      </div>`;
    }).join("");

    return `<div class="venta-grupo" id="vg_${idx}">
      <div class="venta-grupo-header" onclick="toggleGrupo(${idx})">
        <div class="venta-grupo-left">
          <div class="venta-grupo-fecha">${g.fechaStr}</div>
          <div class="venta-grupo-meta">${g.items.length} producto${g.items.length !== 1 ? "s" : ""} · <span class="badge-metodo ${badgeClass}">${g.metodo || "-"}</span></div>
        </div>
        <div class="venta-grupo-right">
          <span class="venta-grupo-total">${fmt(g.total)}</span>
          <svg class="venta-grupo-toggle" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
      <div class="venta-grupo-items">${itemsHtml}</div>
    </div>`;
  }).join("") + (gruposArr.length > 100 ? `<p style="text-align:center;font-size:12px;color:var(--muted-fg);padding:8px 0">Mostrando 100 de ${gruposArr.length} transacciones</p>` : "");
}

function toggleGrupo(idx) {
  const el = document.getElementById("vg_" + idx);
  if (el) el.classList.toggle("open");
}

function updateSubtitle(ventas, desde, hasta) {
  const sub = document.getElementById("reportSubtitle");
  const transacciones = new Set(ventas.map(v => v.fecha + "_" + v.metodo)).size;
  if (!desde && !hasta) {
    sub.textContent = `${transacciones} transacciones en total`;
  } else if (desde && hasta) {
    sub.textContent = `${desde} — ${hasta} · ${transacciones} transacciones`;
  } else if (desde) {
    sub.textContent = `Desde ${desde} · ${transacciones} transacciones`;
  } else {
    sub.textContent = `Hasta ${hasta} · ${transacciones} transacciones`;
  }
}

function renderChart(topProductos) {
  if (reportChart) {
    reportChart.destroy();
    reportChart = null;
  }

  const canvas = document.getElementById("reportChartCanvas");
  if (!canvas || topProductos.length === 0) return;

  const labels = topProductos.map(([name]) => name.length > 20 ? name.slice(0, 18) + "…" : name);
  const data = topProductos.map(([, d]) => d.cantidad);

  const colors = [
    "#2563eb","#10b981","#8b5cf6","#f59e0b","#ef4444",
    "#06b6d4","#ec4899","#84cc16","#f97316","#6366f1"
  ];

  reportChart = new Chart(canvas, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Unidades vendidas",
        data,
        backgroundColor: colors.slice(0, data.length),
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.parsed.y} unidades`
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { family: "Inter", size: 11 }, color: "#64748b" }
        },
        y: {
          beginAtZero: true,
          grid: { color: "#e2e8f0" },
          ticks: { font: { family: "Inter", size: 11 }, color: "#64748b", stepSize: 1 }
        }
      }
    }
  });
}

/* ========== AGREGAR / EDITAR PRODUCTO ========== */
let editingProductId = null;

function openProductModal(producto) {
  editingProductId = producto ? producto.id : null;
  const isEdit = !!producto;

  document.getElementById("productModalTitle").textContent = isEdit ? "Editar Producto" : "Agregar Producto";
  document.getElementById("prodId").value = producto ? producto.id : "";
  document.getElementById("prodNombre").value = producto ? producto.nombre : "";
  document.getElementById("prodDescripcion").value = producto ? (producto.descripcion || "") : "";
  document.getElementById("prodPrecio").value = producto ? producto.precio : "";
  document.querySelectorAll(".cat-option").forEach(r => {
    r.checked = producto ? r.value === producto.categoria : false;
  });

  document.getElementById("prodNombre").classList.remove("invalid");
  document.getElementById("prodPrecio").classList.remove("invalid");

  const deleteBtn = document.getElementById("deleteProductBtn");
  deleteBtn.style.display = isEdit ? "flex" : "none";

  document.getElementById("productModalOverlay").classList.add("open");
  setTimeout(() => document.getElementById("prodNombre").focus(), 320);
}

function closeProductModal() {
  document.getElementById("productModalOverlay").classList.remove("open");
  editingProductId = null;
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById("productModalOverlay")) closeProductModal();
}

async function guardarProducto() {
  const nombre = document.getElementById("prodNombre").value.trim();
  const descripcion = document.getElementById("prodDescripcion").value.trim();
  const precio = parseFloat(document.getElementById("prodPrecio").value);
  const categoria = document.querySelector(".cat-option:checked")?.value || "";
  const id = editingProductId;

  let valid = true;

  if (!nombre) {
    document.getElementById("prodNombre").classList.add("invalid");
    valid = false;
  } else {
    document.getElementById("prodNombre").classList.remove("invalid");
  }

  if (!precio || precio <= 0) {
    document.getElementById("prodPrecio").classList.add("invalid");
    valid = false;
  } else {
    document.getElementById("prodPrecio").classList.remove("invalid");
  }

  if (!categoria) {
    showToast("Seleccioná una categoría.", "error");
    valid = false;
  }

  if (!valid) return;

  const btn = document.getElementById("saveProductBtn");
  btn.disabled = true;
  btn.classList.add("loading");

  try {
    const action = id ? "editarProducto" : "agregarProducto";
    const payload = { action, token: POSTOKEN, nombre, descripcion, precio, categoria };
    if (id) payload.id = id;

    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "data=" + encodeURIComponent(JSON.stringify(payload))
    }).then(r => r.json());

    if (res.ok) {
      showToast(id ? "Producto actualizado: " + nombre : "Producto agregado: " + nombre, "success");
      closeProductModal();
      localStorage.removeItem("productos");
      localStorage.removeItem("productos_timestamp");
      cargarProductos(true);
    } else {
      showToast("Error: " + (res.error || "no se pudo guardar"), "error");
    }
  } catch {
    showToast("No se pudo conectar. Intentá nuevamente.", "error");
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
  }
}

async function eliminarProducto() {
  if (!editingProductId) return;
  if (!confirm("¿Eliminar este producto? Esta acción no se puede deshacer.")) return;

  const btn = document.getElementById("saveProductBtn");
  btn.disabled = true;

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "data=" + encodeURIComponent(JSON.stringify({ action: "eliminarProducto", token: POSTOKEN, id: editingProductId }))
    }).then(r => r.json());

    if (res.ok) {
      showToast("Producto eliminado.", "success");
      closeProductModal();
      localStorage.removeItem("productos");
      localStorage.removeItem("productos_timestamp");
      //cargarProductos(true);
      recargarProductos(true);
    } else {
      showToast("Error: " + (res.error || "no se pudo eliminar"), "error");
    }
  } catch {
    showToast("No se pudo conectar. Intentá nuevamente.", "error");
  } finally {
    btn.disabled = false;
  }
}

/* ========== RESPALDO ========== */
async function generarRespaldo() {
  const btn = document.getElementById("backupBtn");
  btn.disabled = true;
  btn.classList.add("loading");

  try {
    const res = await fetch(API + "?action=backup").then(r => r.json());
    if (res.ok) {
      showToast("Respaldo creado: " + res.nombre, "success");
    } else {
      showToast("Error al crear el respaldo: " + (res.error || "desconocido"), "error");
    }
  } catch {
    showToast("No se pudo conectar para crear el respaldo.", "error");
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
  }
}

/* ========== HELPER ========== */
function normalizarTexto(str) {
  return str
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function capitalizarTexto(str) {
  return str
    .toLowerCase()
    .trim()
    .split(/\s+/)
    .map(p => p.charAt(0).toUpperCase() + p.slice(1))
    .join(" ");
}

function recargarProductos(force = false) {
  const stateEl = document.getElementById("stateCenter");
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  stateEl.style.display = "flex";
  stateEl.innerHTML = '<div class="spinner"></div>';
  cargarProductos(true);
}
</script>
